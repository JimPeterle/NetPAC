<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-light.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body class="dashboard-body">

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">NetPAC</span>
        </div>
        
        <nav class="sidebar-nav">
            <a href="{{ url_for('dashboard') }}" class="sidebar-link active">
                <span class="sidebar-text">Dashboard</span>
            </a>
            <a href="{{ url_for('hosts') }}" class="sidebar-link">
                <span class="sidebar-text">Hosts</span>
            </a>
            <a href="{{ url_for('groups') }}" class="sidebar-link">
                <span class="sidebar-text">Groups</span>
            </a>
            <a href="{{ url_for('scripts') }}" class="sidebar-link">
                <span class="sidebar-text">Scripts</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-menu">
                <button class="user-btn" id="userMenuBtn">
                    <span class="sidebar-text">{{ current_user.id }}</span>
                </button>
                <div class="user-dropdown" id="userDropdown">
                    <a href="{{ url_for('settings') }}">Settings</a>
                    <a href="{{ url_for('logout') }}">Logout</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Toggle Button -->
    <button class="sidebar-toggle" id="sidebarToggle">
        <span class="toggle-icon">☰</span>
    </button>

    <!-- Main Content -->
    <div class="main-content" id="mainContent">
        
        <!-- Header -->
        <div class="dashboard-header">
            <div class="header-content">
                <h1 class="dashboard-title">Dashboard</h1>
            </div>
        </div>

        <!-- Statistics Cards -->
        <div class="stats-container">
            <div class="stat-card stat-card-hosts">
                <div class="stat-content">
                    <h3 class="stat-title">Total hosts</h3>
                    <p class="stat-number">{{ all_hosts }}</p>
                </div>
            </div>

            <div class="stat-card stat-card-groups">
                <div class="stat-content">
                    <h3 class="stat-title">Total groups</h3>
                    <p class="stat-number">{{ all_groups }}</p>
                </div>
            </div>
        </div>

        <!-- Markdown Block -->
        <div class="dashboard-markdown-block markdown-body">
            {{ md | safe }}
        </div>

    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/clipboard.js/2.0.11/clipboard.min.js"></script>

    <script>
        // Sidebar Toggle
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        const sidebarToggle = document.getElementById('sidebarToggle');

        sidebarToggle.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            mainContent.classList.toggle('expanded');
        });

        // User Menu Toggle
        const userMenuBtn = document.getElementById('userMenuBtn');
        const userDropdown = document.getElementById('userDropdown');

        userMenuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            userDropdown.classList.toggle('show');
        });

        document.addEventListener('click', () => {
            userDropdown.classList.remove('show');
        });

        // Highlight.js + Clipboard.js
        document.querySelectorAll('pre code').forEach((block) => {
            hljs.highlightBlock(block);

            const btn = document.createElement('button');
            btn.innerText = 'Copy';
            btn.className = 'copy-btn';
            block.parentNode.appendChild(btn);

            const clipboard = new ClipboardJS(btn, {
                target: () => block
            });

            clipboard.on('success', () => {
                btn.innerText = 'Copied!';
                setTimeout(() => btn.innerText = 'Copy', 1000);
            });
        });
    </script>

</body>
</html>
